<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="./img/pokeball.png" />
  </head>
  <body onload="init()">
    <header>
      <div class="header-content">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
          <img src="./img/pokeball.png" alt="Logo" />
          <h1>Pokédex</h1>
        </div>
        <div class="search-bar">
          <input type="text" id="search" placeholder="Search Pokémon..." onkeydown="handleSearchKey(event)" onkeyup="checkSearchInput()" />
          <button onclick="startSearch()">Search</button>
        </div>
      </div>
    </header>

    <main id="pokemon-container" class="pokemon-grid"></main>

    <div class="load-button">
      <button id="load-more-btn" onclick="loadMore()">Load More Pokémon</button>
    </div>

    <footer class="main-footer">
      <div>©Pokedex 2026</div>
      <div><a href="imprint.html">Imprint</a></div>
      <div style="cursor: pointer;">Cookie Preferences</div>
    </footer>

    <dialog id="overlay" class="overlay" onclick="closeDialog(event)">
      <div id="overlay-content"></div>
    </dialog>

    <div id="loading-screen" class="loading-screen d-none">
      <img src="./img/pokeball.png" class="loading-icon" alt="Loading..." />
      <p>Catching Pokémon...</p>
    </div>

    <script src="templates.js"></script>
    <script src="script.js"></script>
  </body>
</html>
